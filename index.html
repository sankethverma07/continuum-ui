    <title>Relay 01 — A Continuum UI Showcase</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <!-- Neue Montreal — the ONE universal site sans. All weights preloaded
         so the first paint carries the real face and there's no FOUT swap
         into Inter/system. -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=neue-montreal@300,400,500,700,800&display=swap"
      rel="stylesheet"
    />
    <!-- JetBrains Mono for spec/hud labels, Allura for the script decal.
         Inter has been REMOVED — Neue Montreal is the one universal face. -->
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Allura&display=swap"
      rel="stylesheet"
    />
  </head>
